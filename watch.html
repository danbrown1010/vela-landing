<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch a Crew — VELA</title>
<meta name="description" content="Watch a VELA crew's live position on their expedition.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1d22; --bg2: #20242a; --border: #353a42;
  --text: #F0EDE4; --text2: #A8B89A; --text3: #6B7D5E;
  --accent: #C4521A; --safe: #4A7C3F;
  --font: 'Ubuntu', sans-serif; --mono: 'Ubuntu Mono', monospace;
}

body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

nav {
  padding: 14px 20px; display: flex; align-items: center;
  justify-content: space-between;
  background: rgba(26,29,34,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
}

.nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.nav-logo-text { font-family: var(--font); font-weight: 700; font-size: 18px; letter-spacing: 0.08em; color: var(--text); }
.nav-badge { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }

#password-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px 24px; gap: 20px;
}

.pw-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  padding: 32px 28px; width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 16px;
}

.pw-title { font-size: 22px; font-weight: 700; color: var(--text); text-align: center; }
.pw-sub { font-size: 14px; color: var(--text2); text-align: center; line-height: 1.6; }

.pw-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; color: var(--text);
  font-family: var(--mono); font-size: 20px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; outline: none; text-align: center;
}
.pw-input:focus { border-color: var(--accent); }

.pw-error { font-size: 13px; color: #c0392b; text-align: center; font-family: var(--font); display: none; }

.pw-btn {
  background: var(--accent); border: none; border-radius: 10px; padding: 14px;
  color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; width: 100%; transition: background 0.2s;
}
.pw-btn:hover { background: #A8420F; }
.pw-btn:disabled { background: var(--border); color: var(--text3); cursor: default; }

#watch-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }

.crew-bar {
  padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}

.crew-name { font-size: 15px; font-weight: 700; color: var(--text); font-family: var(--font); }
.crew-status { font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em; }
.status-live { color: var(--safe); }
.status-waiting { color: var(--text3); }

.day-badge {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 3px 12px; border-radius: 20px;
  background: rgba(196, 82, 26, 0.15); color: var(--accent);
  white-space: nowrap; display: inline-block;
}

#map { flex: 1; }

.map-overlay {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(26,29,34,0.92); border: 1px solid var(--border);
  backdrop-filter: blur(12px); border-radius: 12px; padding: 12px 20px;
  text-align: center; z-index: 5; min-width: 200px;
}

.overlay-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.overlay-value { font-family: var(--mono); font-size: 13px; color: var(--text); }

@keyframes ripple {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(3); opacity: 0; }
}

.crew-marker { width: 16px; height: 16px; position: relative; }
.crew-marker-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #C4521A; border: 2px solid #fff;
  position: absolute; top: 0; left: 0; z-index: 2;
}
.crew-marker-pulse {
  width: 16px; height: 16px; border-radius: 50%;
  background: #C4521A; position: absolute; top: 0; left: 0;
  animation: ripple 2s ease-out infinite;
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 100 100">
      <path d="M50 5C41.7 5 35 11.7 35 20c0 11.5 15 28 15 28s15-16.5 15-28C65 11.7 58.3 5 50 5zM50 26c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6z" fill="#F0EDE4"/>
      <path d="M2 92L30 38L45 63L38 73L53 92H2z" fill="#F0EDE4" opacity="0.9"/>
      <path d="M98 92L70 45L55 65L62 75L47 92H98z" fill="#F0EDE4" opacity="0.7"/>
    </svg>
    <span class="nav-logo-text">VELA</span>
  </a>
  <span class="nav-badge">Crew Watch</span>
</nav>

<div id="password-screen">
  <div class="pw-card">
    <div style="text-align:center; margin-bottom:4px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#C4521A" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="width:40px;height:40px;margin:0 auto">
        <path d="M1 6l11 6 11-6"/><path d="M1 12l11 6 11-6"/>
      </svg>
    </div>
    <div class="pw-title">Watch a crew</div>
    <div class="pw-sub">Enter the crew password shared with you by the pilot to watch their live expedition.</div>
    <input id="pw-input" class="pw-input" type="text" placeholder="CREW-PASSWORD" maxlength="20" autocomplete="off" autocapitalize="characters"/>
    <div id="pw-error" class="pw-error">Password not found. Check with your pilot and try again.</div>
    <button id="pw-btn" class="pw-btn" onclick="submitPassword()">Watch →</button>
  </div>
  <div style="font-size:12px;color:var(--text3);font-family:var(--mono);text-align:center;">No account required · Read only</div>
</div>

<div id="watch-screen">
  <div class="crew-bar">
    <div>
      <div class="crew-name" id="crew-name">Loading...</div>
      <div id="crew-status" class="crew-status status-waiting">Waiting for broadcast...</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Last update</div>
      <div id="last-update" style="font-size:11px;font-family:var(--mono);color:var(--text2);">—</div>
    </div>
  </div>
  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="map"></div>
    <div class="map-overlay" id="position-overlay" style="display:none">
      <div id="trip-day-badge" style="display:none;margin-bottom:8px;"></div>
      <div class="overlay-label">Crew position</div>
      <div class="overlay-value" id="position-coords">—</div>
      <div id="ecoflow-row" style="display:none;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.1);align-items:center;justify-content:center;gap:6px;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;">EcoFlow</span>
        <span id="ecoflow-soc" style="font-family:var(--mono);font-size:13px;color:var(--text);">—</span>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wyznbarcxwjfjpnrvtpo.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5em5iYXJjeHdqZmpwbnJ2dHBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MjUyODIsImV4cCI6MjA5NDMwMTI4Mn0.TObIFHBarWETYQfYeO99XGo-8RI9mABIigqh5gJtYs4'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let map = null
let crewData = null
let marker = null
let realtimeChannel = null

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search)
  const pw = params.get('pw')
  if (pw) {
    document.getElementById('pw-input').value = pw.toUpperCase()
    submitPassword()
  }
})

async function submitPassword() {
  const pw = document.getElementById('pw-input').value.trim().toUpperCase()
  if (!pw) return

  const btn = document.getElementById('pw-btn')
  btn.disabled = true
  btn.textContent = 'Looking up crew...'
  document.getElementById('pw-error').style.display = 'none'

  try {
    const { data: rows, error } = await sb
      .rpc('get_crew_by_password', { p_password: pw })

    const crew = rows?.[0] ?? null

    if (error || !crew) {
      console.error('Crew lookup:', error ?? 'no match')
      document.getElementById('pw-error').style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Watch →'
      return
    }

    crewData = crew

    const { data: trip } = await sb
      .from('trips')
      .select('*')
      .eq('user_id', crew.pilot_id)
      .eq('is_published', true)
      .maybeSingle()

    showWatchScreen(crew, trip)
  } catch (err) {
    console.error('Password lookup error:', err)
    btn.disabled = false
    btn.textContent = 'Watch →'
  }
}

function showWatchScreen(crew, trip) {
  document.getElementById('password-screen').style.display = 'none'
  const ws = document.getElementById('watch-screen')
  ws.style.display = 'flex'
  document.getElementById('crew-name').textContent = crew.name

  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [-120.5, 47.5],
    zoom: 6,
  })
  map.addControl(new maplibregl.NavigationControl(), 'top-right')

  // Always watch for broadcast start/stop, regardless of initial state
  subscribeToCrewTrips(crew)

  if (trip) {
    startWatching(trip)
  }
}

function startWatching(trip) {
  document.getElementById('crew-status').className = 'crew-status status-live'
  document.getElementById('crew-status').textContent = '● Live broadcast'
  showTripDay(trip)
  loadPosition(trip.id)

  if (realtimeChannel) realtimeChannel.unsubscribe()

  realtimeChannel = sb
    .channel(`trip-positions-${trip.id}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'trip_positions',
      filter: `trip_id=eq.${trip.id}`,
    }, (payload) => {
      if (payload.eventType === 'DELETE') {
        broadcastEnded()
      } else if (payload.new) {
        updateMarker(payload.new.lat, payload.new.lng, payload.new.ecoflow_soc, payload.new.ecoflow_charging)
      }
    })
    .subscribe()
}

async function loadPosition(tripId) {
  const { data } = await sb
    .from('trip_positions')
    .select('*')
    .eq('trip_id', tripId)
    .order('recorded_at', { ascending: false })
    .limit(1)
    .maybeSingle()

  if (data) {
    updateMarker(data.lat, data.lng, data.ecoflow_soc, data.ecoflow_charging)
    updateLastUpdate(data.recorded_at)
  }
}

function updateEcoFlow(soc, charging) {
  const row = document.getElementById('ecoflow-row')
  const el  = document.getElementById('ecoflow-soc')
  if (soc != null) {
    const chargingLabel = charging != null ? (charging ? ' · ⚡ Charging' : ' · Discharging') : ''
    el.textContent = `${soc}%${chargingLabel}`
    el.style.color = soc > 50 ? 'var(--safe)' : soc > 20 ? '#f59e0b' : '#ef4444'
    row.style.display = 'flex'
  } else {
    row.style.display = 'none'
  }
}

function updateMarker(lat, lng, soc, charging) {
  const el = document.createElement('div')
  el.className = 'crew-marker'
  el.innerHTML = '<div class="crew-marker-pulse"></div><div class="crew-marker-dot"></div>'

  if (marker) marker.remove()
  marker = new maplibregl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map)
  map.flyTo({ center: [lng, lat], zoom: 12, duration: 1500 })

  document.getElementById('position-overlay').style.display = 'block'
  document.getElementById('position-coords').textContent =
    `${lat.toFixed(4)}°N · ${Math.abs(lng).toFixed(4)}°W`
  updateEcoFlow(soc ?? null, charging ?? null)
  updateLastUpdate(new Date().toISOString())
}

function updateLastUpdate(timestamp) {
  document.getElementById('last-update').textContent =
    new Date(timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
}

function showTripDay(trip) {
  const badge = document.getElementById('trip-day-badge')
  let label = 'LIVE'
  if (trip?.departure_date) {
    const msPerDay = 1000 * 60 * 60 * 24
    const start = new Date(trip.departure_date)
    start.setHours(0, 0, 0, 0)
    const today = new Date()
    today.setHours(0, 0, 0, 0)
    const dayOf = Math.floor((today - start) / msPerDay) + 1
    if (dayOf >= 1) {
      const totalDays = trip.return_date
        ? Math.floor((new Date(new Date(trip.return_date).setHours(0,0,0,0)) - start) / msPerDay) + 1
        : null
      label = totalDays ? `DAY ${dayOf} / ${totalDays}` : `DAY ${dayOf}`
    }
  }
  badge.innerHTML = `<span style="font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 14px;border-radius:20px;background:rgba(196,82,26,0.2);color:#C4521A;letter-spacing:0.06em;">${label}</span>`
  badge.style.display = 'block'
}

function broadcastEnded() {
  document.getElementById('crew-status').className = 'crew-status status-waiting'
  document.getElementById('crew-status').textContent = 'Broadcast ended'
  document.getElementById('position-overlay').style.display = 'none'
  document.getElementById('trip-day-badge').style.display = 'none'
  if (marker) { marker.remove(); marker = null }
  if (realtimeChannel) { realtimeChannel.unsubscribe(); realtimeChannel = null }
}

function subscribeToCrewTrips(crew) {
  sb.channel(`crew-trips-${crew.pilot_id}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'trips',
      filter: `user_id=eq.${crew.pilot_id}`,
    }, (payload) => {
      // UPDATE where is_published → true: start watching
      if (payload.eventType === 'UPDATE' && payload.new?.is_published) {
        startWatching(payload.new)
      }
      // DELETE means the row is no longer visible to anon (is_published → false)
      // or an explicit UPDATE with is_published false
      else if (payload.eventType === 'DELETE' || (payload.eventType === 'UPDATE' && !payload.new?.is_published)) {
        broadcastEnded()
      }
    })
    .subscribe()
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitPassword()
  })
})
</script>
</body>
</html>
